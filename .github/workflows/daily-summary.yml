# Amplify has no scheduler, so the daily order summary is driven from here.
# Runs once a day; the endpoint summarises the previous full day.
name: Daily order summary

on:
  schedule:
    # 03:15 UTC = 08:15 Pakistan time — a morning digest of yesterday's orders.
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily summary
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set."
            exit 1
          fi

          code=$(curl -sS -o response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://www.ecoglobalfoods.com/api/cron/daily-summary)

          echo "HTTP $code"
          cat response.json
          echo

          if [ "$code" != "200" ]; then
            echo "::error::Daily summary failed with HTTP $code"
            exit 1
          fi
