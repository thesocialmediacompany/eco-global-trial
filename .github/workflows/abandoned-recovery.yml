# Amplify hosting has no scheduler, so the abandoned-cart follow-up is driven
# from here. The endpoint decides which nudge each cart is due, so running late
# or twice is harmless.
name: Abandoned checkout recovery

on:
  schedule:
    # Hourly. The first nudge is due 1h after a cart is abandoned, so a cart
    # waits at most ~2h for it. GitHub queues scheduled runs under load, which
    # is fine here: nothing expires, it just sends on the next pass.
    - cron: "17 * * * *"
  workflow_dispatch: # lets you trigger a sweep by hand from the Actions tab

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Send due nudges
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set."
            exit 1
          fi

          code=$(curl -sS -o response.json -w "%{http_code}" \
            --max-time 90 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://www.ecoglobalfoods.com/api/cron/abandoned-recovery)

          echo "HTTP $code"
          cat response.json
          echo

          if [ "$code" != "200" ]; then
            echo "::error::Sweep failed with HTTP $code"
            exit 1
          fi

          # Surface send failures as a failed run rather than a green tick,
          # so a broken mailer is noticed instead of silently recovering nobody.
          failed=$(grep -o '"failed":[0-9]*' response.json | cut -d: -f2)
          if [ "${failed:-0}" != "0" ]; then
            echo "::error::$failed nudge(s) failed to send"
            exit 1
          fi
