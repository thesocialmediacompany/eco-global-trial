version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "DIRECT_URL=$DIRECT_URL" >> .env.production
        - echo "AUTH_SECRET=$AUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "NODE_ENV=production" >> .env.production
        - echo "ZOOMCOD_API_KEY=$ZOOMCOD_API_KEY" >> .env.production
        - echo "ZOOMCOD_CLIENT_CODE=$ZOOMCOD_CLIENT_CODE" >> .env.production
        - echo "ZOOMCOD_PROFILE_ID=$ZOOMCOD_PROFILE_ID" >> .env.production
        - echo "ZOOMCOD_ORIGIN=$ZOOMCOD_ORIGIN" >> .env.production
        - echo "ZOOMCOD_SERVICE_TYPE=$ZOOMCOD_SERVICE_TYPE" >> .env.production
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production
        - echo "S3_REGION=$S3_REGION" >> .env.production
        - echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> .env.production
        - echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> .env.production
        - echo "S3_PUBLIC_BASE_URL=$S3_PUBLIC_BASE_URL" >> .env.production
        - echo "GA4_PROPERTY_ID=$GA4_PROPERTY_ID" >> .env.production
        - echo "GA4_CLIENT_EMAIL=$GA4_CLIENT_EMAIL" >> .env.production
        - echo "GA4_PRIVATE_KEY=$GA4_PRIVATE_KEY" >> .env.production
        - echo "CRON_SECRET=$CRON_SECRET" >> .env.production
        - echo "VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY" >> .env.production
        - echo "VAPID_SUBJECT=$VAPID_SUBJECT" >> .env.production
        - npm ci --include=dev
        - npx prisma generate
        - npx prisma db push
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*