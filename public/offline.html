<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline · EGF Admin</title>
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,-apple-system,sans-serif; background:#faf6ef; color:#2b0e47; text-align:center; padding:2rem; }
  .box { max-width:22rem; }
  img { width:88px; height:88px; border-radius:20px; }
  h1 { font-size:1.25rem; margin:1.25rem 0 .5rem; }
  p { color:#6b5566; line-height:1.5; margin:0 0 1.5rem; }
  button { background:#2b0e47; color:#fff; border:0; border-radius:10px; padding:.7rem 1.4rem; font-size:.95rem; font-weight:600; }
</style>
</head>
<body>
  <div class="box">
    <img src="/icons/icon-192.png" alt="EGF" />
    <h1>You're offline</h1>
    <p>EGF Admin needs a connection to load live orders and data. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
